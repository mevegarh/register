<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Attendance Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PAGE 1: SETUP -->
  <div id="login-screen" class="card">
    <h2>Teacher Setup</h2>
    <form id="login-form">
      <label>Teacher Name</label>
      <input type="text" id="teacher-name" required placeholder="e.g., Jane Doe">
      <label>Class / Grade</label>
      <input type="text" id="class-name" required placeholder="e.g., Grade 12-C">
      <label>Phone Number</label>
      <input type="tel" id="phone-number" required placeholder="e.g., 555-0123">
      <button type="submit">Create Register →</button>
    </form>
  </div>

  <!-- PAGE 2: REGISTER DASHBOARD -->
  <div id="register-screen" class="hidden">
    <div class="header-bar">
      <div>
        <h2 id="display-class">Class</h2>
        <p id="display-teacher" style="color: var(--text-muted); margin: 0; font-size: 0.9rem;"></p>
      </div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">◀</button>
        <span id="month-label" class="month-label">July 2026</span>
        <button onclick="changeMonth(1)">▶</button>
      </div>
    </div>

    <div class="table-container">
      <table id="register-table">
        <thead><tr id="table-headers"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- MODAL: ADD STUDENT -->
  <div id="student-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>Add New Student</h3>
      <form id="student-form">
        <label>Student Name</label>
        <input type="text" id="student-name-input" required placeholder="e.g. John Miller">
        <label>Parent's Phone Number</label>
        <input type="tel" id="student-phone-input" required placeholder="e.g. +15550199">
        <div class="modal-actions">
          <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
          <button type="submit">Add Student</button>
        </div>
      </form>
    </div>
  </div>
  
<!-- BRAND SIGNATURE FOOTER -->
  <div class="app-brand-footer">
    This app is created and designed by <strong>MohammadHusain Z Mevegar</strong>
  </div>
<script src="script.js"></script>
</body>
</html>
